name: Build zip

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the source code
        uses: actions/checkout@v3

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          coverage: none

      - name: Set up Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Build plugin package
        run: |
          BUILD_MODE=$([ "${{ github.event.release.prerelease }}" = "true" ] && echo "prerelease" || echo "stable")
          ./install/build-plugin-package.sh "${BUILD_MODE}" "${GITHUB_WORKSPACE}/build-artifacts"

      - name: Upload Release Artifact
        uses: AButler/upload-release-assets@v3.0
        with:
          files: ./build-artifacts/cf7-vk-wp-plugin.zip
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set target branch
        id: branch
        run: echo "branch_name=$([ '${{ github.event.release.prerelease }}' == 'true' ] && echo 'plugin-dist' || echo 'stable')" >> "$GITHUB_OUTPUT"

      - name: Push to release branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          export TEMP_DIR=$(mktemp -d)
          export DIST_WORKTREE=$(mktemp -d)
          export TARGET_BRANCH=${{ steps.branch.outputs.branch_name }}

          cp -r build-artifacts/cf7-vk/. "$TEMP_DIR/"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git fetch origin "$TARGET_BRANCH"
            git worktree add --force "$DIST_WORKTREE" "origin/$TARGET_BRANCH"
            cd "$DIST_WORKTREE"
          else
            git worktree add --detach "$DIST_WORKTREE"
            cd "$DIST_WORKTREE"
            git checkout --orphan "$TARGET_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -r "$TEMP_DIR"/. .

          git add -f vendor
          git add -f react/build
          git add .
          git commit -m "Update plugin build from release ${{ github.event.release.tag_name }}" || echo "No changes to commit"
          git push origin HEAD:"$TARGET_BRANCH"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare version without "v"
        id: clean_version
        run: echo "value=${{ github.event.release.tag_name }}" | sed -E 's/^value=(v|version)-?/value=/' >> $GITHUB_OUTPUT

      - name: Deploy to WordPress.org (production only)
        if: ${{ github.event.release.prerelease == false }}
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.WPORG_USERNAME }}
          SVN_PASSWORD: ${{ secrets.WPORG_PASSWORD }}
          BUILD_DIR: ./build-artifacts/cf7-vk
          SLUG: cf7-vk
          VERSION: ${{ steps.clean_version.outputs.value }}
